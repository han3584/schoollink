<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>학연지연 - 우리 학교 친구들 다 모임</title>
    <style>
        /* MZ 스타일 포인트: 깔끔한 폰트와 볼드한 버튼 */
        :root {
            --primary-black: #1a1a1a;
            --accent-blue: #4a90e2;
            --bg-gray: #f2f2f7;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Apple SD Gothic Neo", sans-serif; 
            background-color: var(--bg-gray); 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100dvh; 
            margin: 0; 
        }

        .container { 
            background: white; 
            padding: 40px 30px; 
            border-radius: 24px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
            width: 100%;
            max-width: 340px; 
            text-align: center; 
        }

        h1 { 
            font-size: 28px; 
            font-weight: 800; 
            color: var(--primary-black); 
            margin: 0 0 10px 0; 
            letter-spacing: -1px;
        }

        p { 
            font-size: 14px; 
            color: #666; 
            margin-bottom: 30px; 
            line-height: 1.5;
        }

        .input-group { margin-bottom: 12px; text-align: left; }
        
        input { 
            width: 100%; 
            padding: 16px; 
            border: 1px solid #e5e5e5; 
            border-radius: 12px; 
            box-sizing: border-box; 
            font-size: 16px; 
            transition: border-color 0.2s;
            outline: none;
            background: #fafafa;
        }

        input:focus { border-color: var(--accent-blue); background: white; }

        button { 
            width: 100%; 
            padding: 18px; 
            background-color: var(--primary-black); 
            color: white; 
            border: none; 
            border-radius: 16px; 
            cursor: pointer; 
            font-size: 17px; 
            font-weight: bold; 
            margin-top: 20px;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.98); background-color: #333; }

        .footer { font-size: 12px; color: #aaa; margin-top: 25px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤝 학연지연</h1>
        <p>인증 따윈 필요 없음!<br>우리 학교 친구들을 지금 바로 찾으세요.</p>
        
        <form id="entryForm">
            <div class="input-group">
                <input type="text" id="schoolName" placeholder="출신 학교 (예: 한국고)" required>
            </div>
            <div class="input-group">
                <input type="number" id="entryYear" placeholder="입학 년도 (예: 2010)" required>
            </div>
            <div class="input-group">
                <input type="text" id="nickname" placeholder="사용할 닉네임" required>
            </div>
            <button type="submit">동창방 입장 💨</button>
        </form>

        <div class="footer">
            © 2026 학연지연. All rights reserved.
        </div>
    </div>

    <script>
        document.getElementById('entryForm').onsubmit = function(e) {
            e.preventDefault();
            const school = document.getElementById('schoolName').value;
            const year = document.getElementById('entryYear').value;
            const nick = document.getElementById('nickname').value;
            
            // 닉네임까지 포함해서 채팅 페이지로 이동
            location.href = `chat.html?school=${encodeURIComponent(school)}&year=${year}&nick=${encodeURIComponent(nick)}`;
        };
    </script>
</body>
</html>
