<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>학연지연 - 프로필 설정</title>
    <style>
        :root { --p-black: #1a1a1a; --p-blue: #4a90e2; --bg: #f2f2f7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100dvh; margin: 0; }
        .container { background: white; padding: 40px 30px; border-radius: 24px; width: 100%; max-width: 340px; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.05); }
        h1 { font-size: 26px; font-weight: 800; margin-bottom: 20px; }
        .step { display: none; }
        .active { display: block; }
        input { width: 100%; padding: 15px; border: 1px solid #eee; border-radius: 12px; margin-bottom: 10px; box-sizing: border-box; font-size: 16px; background: #fafafa; }
        button { width: 100%; padding: 18px; background: var(--p-black); color: white; border: none; border-radius: 16px; font-size: 16px; font-weight: bold; cursor: pointer; margin-top: 10px; }
        
        /* 프로필 이미지 업로드 스타일 */
        .profile-upload { width: 100px; height: 100px; border-radius: 50%; background: #eee; margin: 0 auto 20px; cursor: pointer; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 2px dashed #ccc; }
        .profile-upload img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<div class="container">
    <h1>🤝 학연지연</h1>

    <div id="step1" class="step active">
        <p>우리 학교 정보를 입력해주세요.</p>
        <input type="text" id="schoolName" placeholder="출신 학교 (예: 한국고)">
        <input type="number" id="entryYear" placeholder="입학 년도 (예: 2010)">
        <input type="text" id="nickname" placeholder="사용할 닉네임">
        <button onclick="goStep2()">다음으로 ➡️</button>
    </div>

    <div id="step2" class="step">
        <p>프로필을 완성해주세요!</p>
        <div class="profile-upload" onclick="document.getElementById('pImg').click()">
            <img id="preview" src="" style="display:none;">
            <span id="plus">+</span>
        </div>
        <input type="file" id="pImg" accept="image/*" style="display:none;" onchange="previewImage(this)">
        <input type="text" id="realName" placeholder="표시될 이름 (본명 권장)">
        <button id="finalBtn" onclick="joinChat()">학연지연 시작하기 🔥</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyAXkZ-65CkAe-3usVaJa2EfhzejLJodCvQ",
    databaseURL: "https://test-1966e-default-rtdb.firebaseio.com",
    projectId: "test-1966e",
    // ⚠️ 이 부분을 반드시 아래 이름으로 수정해 주세요!
    storageBucket: "test-1966e.firebasestorage.app", 
    appId: "1:1067794324006:web:a98367fccd9db10623a4e7"
};
    firebase.initializeApp(firebaseConfig);
    const storage = firebase.storage();

    let userData = {};

    function goStep2() {
        userData.school = document.getElementById('schoolName').value;
        userData.year = document.getElementById('entryYear').value;
        userData.nick = document.getElementById('nickname').value;
        if(!userData.school || !userData.year || !userData.nick) return alert("모두 입력해주세요!");
        
        document.getElementById('step1').classList.remove('active');
        document.getElementById('step2').classList.add('active');
    }

    function previewImage(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => {
                document.getElementById('preview').src = e.target.result;
                document.getElementById('preview').style.display = 'block';
                document.getElementById('plus').style.display = 'none';
            };
            reader.readAsDataURL(input.files[0]);
        }
    }

    async function joinChat() {
        const name = document.getElementById('realName').value;
        const file = document.getElementById('pImg').files[0];
        if(!name) return alert("이름을 입력해주세요!");

        const btn = document.getElementById('finalBtn');
        btn.innerText = "프로필 업로드 중...";
        btn.disabled = true;

        let profileUrl = "https://cdn-icons-png.flaticon.com/512/149/149071.png"; // 기본 이미지

        if(file) {
            const ref = storage.ref(`profiles/${Date.now()}_${file.name}`);
            await ref.put(file);
            profileUrl = await ref.getDownloadURL();
        }

        // 정보를 세션 스토리지에 임시 저장 (URL 길어짐 방지)
        sessionStorage.setItem('profileUrl', profileUrl);
        sessionStorage.setItem('realName', name);

        location.href = `chat.html?school=${encodeURIComponent(userData.school)}&year=${userData.year}&nick=${encodeURIComponent(userData.nick)}`;
    }
</script>
</body>
</html>
