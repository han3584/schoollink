<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실시간 동창 대화방</title>
    <style>
        body { font-family: sans-serif; margin: 0; background-color: #e6ecf0; }
        .header { background: #4a90e2; color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; z-index: 10; }
        .chat-box { height: calc(100vh - 160px); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        
        /* 메시지 스타일 */
        .msg-container { margin-bottom: 15px; display: flex; flex-direction: column; }
        .msg-sender { font-size: 12px; color: #555; margin-bottom: 3px; margin-left: 5px; }
        .msg-bubble { background: white; padding: 10px 15px; border-radius: 18px; max-width: 70%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-break: break-all; }
        
        /* 내가 보낸 메시지 스타일 */
        .me { align-self: flex-end; align-items: flex-end; }
        .me .msg-bubble { background: #dcf8c6; }
        .me .msg-sender { margin-right: 5px; }

        .input-area { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; display: flex; box-sizing: border-box; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { margin-left: 10px; padding: 10px 20px; background: #4a90e2; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <span id="roomTitle">연결 중...</span>
    </div>

    <div id="chatBox" class="chat-box"></div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMsg()">
        <button onclick="sendMsg()">전송</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // ⚠️ 주의: 아래의 config 내용을 본인의 Firebase 설정값으로 반드시 교체하세요!
        const firebaseConfig = {
            apiKey: "1067794324006",
            authDomain: "test-1966e.firebaseapp.com",
            databaseURL: "https://test-1966e-default-rtdb.firebaseio.com",
            projectId: "test-1966e",
            storageBucket: "test-1966e.appspot.com",
            messagingSenderId: "han3584",
            appId: "1:1067794324006:web:a98367fccd9db10623a4e7"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const school = params.get('school');
        const year = params.get('year');
        const myNick = params.get('nick');
        const roomId = btoa(encodeURIComponent(school + year));

        document.getElementById('roomTitle').innerText = `🎓 ${school} ${year}학번 (${myNick}님)`;

        // 메시지 전송
        function sendMsg() {
            const input = document.getElementById('msgInput');
            if(!input.value.trim()) return;

            database.ref('rooms/' + roomId).push({
                text: input.value,
                sender: myNick, // 입력받은 닉네임 저장
                timestamp: Date.now()
            });
            input.value = '';
        }

        // 메시지 수신 및 화면 표시
        database.ref('rooms/' + roomId).on('child_added', (snapshot) => {
            const data = snapshot.val();
            const chatBox = document.getElementById('chatBox');
            
            const isMe = data.sender === myNick; // 내가 보낸 건지 확인
            
            const container = document.createElement('div');
            container.className = `msg-container ${isMe ? 'me' : ''}`;
            
            container.innerHTML = `
                <div class="msg-sender">${data.sender}</div>
                <div class="msg-bubble">${data.text}</div>
            `;
            
            chatBox.appendChild(container);
            chatBox.scrollTop = chatBox.scrollHeight;
        });
    </script>
</body>
</html>
