<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>동창 대화방</title>
    <style>
        :root { --bg-color: #abc1d1; --primary-color: #4a90e2; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100dvh; background-color: var(--bg-color); font-family: sans-serif; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100%; width: 100%; }
        .header { height: 50px; background: white; display: flex; align-items: center; justify-content: center; font-weight: bold; border-bottom: 1px solid #ddd; }
        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; }
        .input-area { background: white; padding: 10px; display: flex; gap: 10px; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        input { flex: 1; height: 40px; border-radius: 20px; border: 1px solid #ddd; padding: 0 15px; font-size: 16px; outline: none; }
        button { width: 60px; background: var(--primary-color); color: white; border: none; border-radius: 10px; font-weight: bold; }
        
        /* 메시지 스타일 */
        .msg-container { margin-bottom: 10px; display: flex; flex-direction: column; }
        .msg-sender { font-size: 11px; margin-bottom: 2px; color: #555; }
        .msg-bubble { background: white; padding: 8px 12px; border-radius: 10px; max-width: 80%; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-break: break-all; }
        .me { align-self: flex-end; align-items: flex-end; }
        .me .msg-bubble { background: #fee500; }
        .me .msg-sender { display: none; }
        #error-display { color: red; background: white; position: fixed; top: 0; z-index: 100; width: 100%; font-size: 12px; }
    </style>
</head>
<body>

<div id="error-display"></div> <div id="app">
    <div class="header" id="roomTitle">연결 중...</div>
    <div id="chatBox"></div>
    <div class="input-area">
        <input type="text" id="msgInput" placeholder="메시지 입력..." autocomplete="off">
        <button onclick="sendMsg()">전송</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    // [에러 진단기] 화면에 에러를 강제로 띄웁니다.
    window.onerror = function(msg, url, line) {
        document.getElementById('error-display').innerHTML = `에러: ${msg} <br> 위치: ${line}번 줄`;
        return false;
    };

    // 2. Firebase 설정 (반드시 본인 것으로 교체!)
    const firebaseConfig = {
        apiKey: "1067794324006", // <--- 여기를 수정하셨나요?
        databaseURL: "https://test-1966e-default-rtdb.firebaseio.com",
        projectId: "test-1966e",
        appId: "1:1067794324006:web:a98367fccd9db10623a4e7"
    };

    // 설정값이 그대로면 경고
    if(firebaseConfig.apiKey.includes("YOUR_")) {
        alert("Firebase 설정값을 먼저 입력해주세요!");
    }

    // 3. 실행 로직
    try {
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const params = new URLSearchParams(window.location.search);
        const school = params.get('school') || "알 수 없음";
        const year = params.get('year') || "0000";
        const myNick = params.get('nick') || "익명";
        const roomId = btoa(encodeURIComponent(school + year));

        document.getElementById('roomTitle').innerText = `${school} ${year}학번`;

        const input = document.getElementById('msgInput');
        
        function sendMsg() {
            if(!input.value.trim()) return;
            database.ref('rooms/' + roomId).push({
                text: input.value,
                sender: myNick
            });
            input.value = '';
            input.focus();
        }

        // 엔터키 처리
        input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });

        // 실시간 수신
        database.ref('rooms/' + roomId).on('child_added', (snapshot) => {
            const data = snapshot.val();
            const chatBox = document.getElementById('chatBox');
            const isMe = data.sender === myNick;
            
            const container = document.createElement('div');
            container.className = `msg-container ${isMe ? 'me' : ''}`;
            container.innerHTML = `
                <div class="msg-sender">${data.sender}</div>
                <div class="msg-bubble">${data.text}</div>
            `;
            chatBox.appendChild(container);
            chatBox.scrollTop = chatBox.scrollHeight;
        });

        // 모바일 높이 대응
        function adjustHeight() {
            const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
            document.getElementById('app').style.height = `${vh}px`;
        }
        window.visualViewport?.addEventListener('resize', adjustHeight);
        window.addEventListener('load', adjustHeight);

    } catch (e) {
        document.getElementById('error-display').innerText = "초기화 실패: " + e.message;
    }
</script>

</body>
</html>
