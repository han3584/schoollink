<style>
    .msg-wrapper { display: flex; gap: 8px; margin-bottom: 15px; }
    .profile-circle { width: 35px; height: 35px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #eee; }
    .profile-circle img { width: 100%; height: 100%; object-fit: cover; }
    .msg-content-wrapper { display: flex; flex-direction: column; max-width: 75%; }
    
    .me { flex-direction: row-reverse; }
    .me .msg-content-wrapper { align-items: flex-end; }
    .me .profile-circle { display: none; } /* 내 프로필은 생략 가능 (카톡 스타일) */
    
    .msg-sender { font-size: 11px; color: #555; margin-bottom: 3px; }
    .msg-bubble { background: white; padding: 10px 14px; border-radius: 12px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); }
    .me .msg-bubble { background: #fee500; }
</style>

<script>
    // 세션 스토리지에서 프로필 정보 가져오기
    const myProfileUrl = sessionStorage.getItem('profileUrl') || "";
    const myRealName = sessionStorage.getItem('realName') || "익명";

    // 메시지 전송 시 프로필 정보 포함
    function sendMsg() {
        const input = document.getElementById('msgInput');
        if(!input.value.trim()) return;
        chatRef.push({ 
            type: 'text', 
            text: input.value, 
            sender: myNick,
            realName: myRealName,
            profile: myProfileUrl 
        });
        input.value = '';
        input.focus();
    }

    // 메시지 수신 시 렌더링 수정
    chatRef.on('child_added', (snapshot) => {
        const data = snapshot.val();
        const chatBox = document.getElementById('chatBox');
        if(data.type === 'system') {
            const div = document.createElement('div');
            div.className = 'system-msg';
            div.innerText = data.text;
            chatBox.appendChild(div);
        } else {
            const isMe = data.sender === myNick;
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${isMe ? 'me' : ''}`;
            
            wrapper.innerHTML = `
                <div class="profile-circle"><img src="${data.profile}"></div>
                <div class="msg-content-wrapper">
                    <div class="msg-sender">${data.realName} (${data.sender})</div>
                    <div class="msg-bubble">${data.type === 'image' ? `<img src="${data.url}" class="chat-img" onclick="window.open(this.src)">` : data.text}</div>
                </div>
            `;
            chatBox.appendChild(wrapper);
        }
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    });
</script>
