<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>동창 대화방</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --bg-color: #abc1d1; /* 카카오톡 배경색 느낌 */
            --header-height: 50px;
            --input-height: 60px;
        }

        /* 1. 전체 화면 고정 (바운스 방지) */
        html, body {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden; /* 전체 스크롤 막기 */
            background-color: var(--bg-color);
            position: fixed; /* 전체 화면 고정 */
        }

        #app {
            display: flex;
            flex-direction: column;
            height: 100%; /* JS에서 동적으로 조절할 예정 */
            width: 100%;
        }

        /* 2. 헤더 디자인 */
        .header {
            height: var(--header-height);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            z-index: 10;
        }

        /* 3. 대화 영역 (여기가 진짜 스크롤되는 부분) */
        #chatBox {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
            -webkit-overflow-scrolling: touch;
        }

        .msg-container { margin-bottom: 12px; display: flex; flex-direction: column; max-width: 85%; }
        .msg-sender { font-size: 12px; color: #444; margin-bottom: 4px; margin-left: 3px; }
        .msg-bubble { 
            background: white; padding: 10px 14px; border-radius: 12px; 
            font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1);
            word-break: break-all; position: relative;
        }

        .me { align-self: flex-end; align-items: flex-end; }
        .me .msg-bubble { background: #fee500; border-radius: 12px; }
        .me .msg-sender { display: none; }

        /* 4. 하단 입력창 (키보드 대응) */
        .input-area {
            background: white;
            padding: 10px 10px env(safe-area-inset-bottom) 10px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        input {
            flex: 1;
            height: 40px;
            border: 1px solid #ddd;
            border-radius: 20px;
            padding: 0 15px;
            font-size: 16px; /* iOS 자동 줌 방지 */
            outline: none;
            background: #fcfcfc;
        }

        button {
            width: 55px; height: 40px;
            background: var(--primary-color);
            color: white; border: none; border-radius: 10px;
            font-weight: bold; font-size: 14px;
        }
    </style>
</head>
<body>

<div id="app">
    <div class="header" id="roomTitle">연결 중...</div>
    
    <div id="chatBox">
        </div>

    <div class="input-area" id="inputArea">
        <input type="text" id="msgInput" placeholder="메시지 입력..." autocomplete="off">
        <button onclick="sendMsg()">전송</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    // --- [모바일 키보드 대응 핵심 로직] ---
    function adjustHeight() {
        // Visual Viewport API를 사용하여 실제 보이는 화면 높이로 조절
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.getElementById('app').style.height = `${vh}px`;
        window.scrollTo(0, 0); // 화면 튕김 방지
    }

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', () => {
            adjustHeight();
            const chatBox = document.getElementById('chatBox');
            chatBox.scrollTop = chatBox.scrollHeight; // 키보드 올라올 때 스크롤 하단 고정
        });
    }
    window.addEventListener('load', adjustHeight);
    // ------------------------------------

        // ⚠️ 주의: 아래의 config 내용을 본인의 Firebase 설정값으로 반드시 교체하세요!
        const firebaseConfig = {
            apiKey: "1067794324006",
            authDomain: "test-1966e.firebaseapp.com",
            databaseURL: "https://test-1966e-default-rtdb.firebaseio.com",
            projectId: "test-1966e",
            storageBucket: "test-1966e.appspot.com",
            messagingSenderId: "han3584",
            appId: "1:1067794324006:web:a98367fccd9db10623a4e7"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    const params = new URLSearchParams(window.location.search);
    const school = params.get('school');
    const year = params.get('year');
    const myNick = params.get('nick');
    const roomId = btoa(encodeURIComponent(school + year));

    document.getElementById('roomTitle').innerText = `${school} ${year}학번`;

    const input = document.getElementById('msgInput');
    input.addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });

    function sendMsg() {
        if(!input.value.trim()) return;
        database.ref('rooms/' + roomId).push({
            text: input.value,
            sender: myNick,
            timestamp: Date.now()
        });
        input.value = '';
        input.focus(); // 전송 후에도 입력창 포커스 유지 (모바일 필수!)
    }

    database.ref('rooms/' + roomId).on('child_added', (snapshot) => {
        const data = snapshot.val();
        const chatBox = document.getElementById('chatBox');
        const isMe = data.sender === myNick;
        
        const container = document.createElement('div');
        container.className = `msg-container ${isMe ? 'me' : ''}`;
        container.innerHTML = `
            <div class="msg-sender">${data.sender}</div>
            <div class="msg-bubble">${data.text}</div>
        `;
        
        chatBox.appendChild(container);
        chatBox.scrollTop = chatBox.scrollHeight;
    });
</script>

</body>
</html>
