<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>학연지연 - 실시간 톡</title>
    <style>
        :root { --bg-color: #abc1d1; --primary-color: #4a90e2; }
        
        /* 📱 모바일 전체 높이 고정 및 스크롤 방지 */
        body, html { 
            margin: 0; padding: 0; width: 100%; height: 100%; 
            background-color: var(--bg-color); font-family: -apple-system, sans-serif; 
            overflow: hidden; position: fixed; /* 전체 스크롤 방지 */
        }

        /* 메인 컨테이너: flex 구조로 변경 */
        #app { 
            display: flex; flex-direction: column; 
            width: 100%; height: 100%; /* JS에서 높이를 실시간 조절함 */
            transition: height 0.1s ease-out;
        }
        
        /* 헤더 스타일 */
        .header { 
            height: 60px; background: white; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; border-bottom: 1px solid #ddd; 
            z-index: 10; cursor: pointer; flex-shrink: 0;
        }
        .header .title { font-weight: bold; font-size: 16px; margin-bottom: 2px; }
        .header .user-count { font-size: 11px; color: var(--primary-color); font-weight: bold; }

        /* 💬 채팅 영역: 남은 공간 모두 차지 */
        #chatBox { 
            flex: 1; overflow-y: auto; padding: 15px; 
            display: flex; flex-direction: column; 
            -webkit-overflow-scrolling: touch; 
        }

        .msg-wrapper { display: flex; gap: 8px; margin-bottom: 15px; }
        .profile-circle { width: 35px; height: 35px; border-radius: 50%; overflow: hidden; flex-shrink: 0; background: #eee; border: 1px solid rgba(0,0,0,0.05); }
        .profile-circle img { width: 100%; height: 100%; object-fit: cover; }
        .msg-content-wrapper { display: flex; flex-direction: column; max-width: 75%; }
        .msg-sender { font-size: 11px; color: #444; margin-bottom: 3px; }
        .msg-bubble { background: white; padding: 10px 14px; border-radius: 12px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-break: break-all; }
        .system-msg { align-self: center; background: rgba(0,0,0,0.15); color: white; padding: 5px 15px; border-radius: 20px; font-size: 11px; margin: 10px 0; text-align: center; }
        
        .me { flex-direction: row-reverse; }
        .me .msg-content-wrapper { align-items: flex-end; }
        .me .profile-circle { display: none; }
        .me .msg-bubble { background: #fee500; }
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; }

        /* ⌨️ 입력창 영역: 키보드 위에 딱 붙도록 설정 */
        .input-area { 
            background: white; padding: 10px; display: flex; gap: 8px; align-items: center; 
            padding-bottom: calc(10px + env(safe-area-inset-bottom)); 
            border-top: 1px solid #ddd; flex-shrink: 0;
        }
        input[type="text"] { flex: 1; height: 40px; border-radius: 20px; border: 1px solid #ddd; padding: 0 15px; font-size: 16px; outline: none; background: #fcfcfc; }
        .btn-icon { background: #eee; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .btn-send { width: 55px; height: 40px; background: var(--primary-color); color: white; border: none; border-radius: 10px; font-weight: bold; }

        /* 모달 스타일 */
        #editModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 100; justify-content: center; align-items: center; }
        .modal-content { background: white; width: 85%; max-width: 320px; padding: 30px; border-radius: 24px; text-align: center; }
        .modal-profile-upload { width: 80px; height: 80px; border-radius: 50%; background: #eee; margin: 0 auto 15px; cursor: pointer; overflow: hidden; border: 2px solid var(--primary-color); }
        .modal-profile-upload img { width: 100%; height: 100%; object-fit: cover; }
        .modal-content input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 10px; margin-bottom: 15px; box-sizing: border-box; }
        .modal-btns { display: flex; gap: 10px; }
        .modal-btns button { flex: 1; padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; }
        .btn-save { background: var(--primary-color); color: white; }
        .btn-cancel { background: #eee; }
    </style>
</head>
<body>

<div id="app">
    <div class="header" onclick="openEditModal()">
        <div class="title" id="roomTitle">학연지연</div>
        <div class="user-count" id="userCount">접속자 확인 중...</div>
    </div>
    <div id="chatBox"></div>
    <div class="input-area">
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="uploadImage(this)">
        <button class="btn-icon" onclick="document.getElementById('fileInput').click()">📷</button>
        <input type="text" id="msgInput" placeholder="메시지 입력..." autocomplete="off">
        <button class="btn-send" onclick="sendMsg()">전송</button>
    </div>
</div>

<div id="editModal">
    <div class="modal-content">
        <h3>내 프로필 수정</h3>
        <div class="modal-profile-upload" onclick="document.getElementById('editFile').click()">
            <img id="editPreview" src="">
        </div>
        <input type="file" id="editFile" accept="image/*" style="display:none" onchange="previewEdit(this)">
        <input type="text" id="editRealName" placeholder="새로운 이름">
        <div class="modal-btns">
            <button class="btn-cancel" onclick="closeEditModal()">취소</button>
            <button class="btn-save" id="saveBtn" onclick="saveProfile()">저장</button>
        </div>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAXkZ-65CkAe-3usVaJa2EfhzejLJodCvQ",
        databaseURL: "https://test-1966e-default-rtdb.firebaseio.com",
        projectId: "test-1966e",
        storageBucket: "test-1966e.firebasestorage.app",
        appId: "1:1067794324006:web:a98367fccd9db10623a4e7"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const storage = firebase.storage();

    const params = new URLSearchParams(window.location.search);
    const school = params.get('school') || "학연지연";
    const year = params.get('year') || "동창";
    const myNick = params.get('nick') || "익명";
    
    let myRealName = sessionStorage.getItem('realName') || "익명";
    let myProfileUrl = sessionStorage.getItem('profileUrl') || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
    const roomId = encodeURIComponent(school + year).replace(/%/g, "");

    document.getElementById('roomTitle').innerText = `🤝 ${school} ${year}학번`;

    const chatRef = database.ref('rooms/' + roomId);
    const presenceRef = database.ref('rooms/' + roomId + '/presence');

    // 리스너 및 데이터 수신
    chatRef.off('child_added'); 
    chatRef.on('child_added', (snapshot) => {
        const data = snapshot.val();
        if (!data || !data.type) return;

        const chatBox = document.getElementById('chatBox');
        if (data.type === 'system') {
            const div = document.createElement('div');
            div.className = 'system-msg';
            div.innerText = data.text || "";
            chatBox.appendChild(div);
        } else {
            const isMe = data.sender === myNick;
            const wrapper = document.createElement('div');
            wrapper.className = `msg-wrapper ${isMe ? 'me' : ''}`;
            
            const displayName = data.realName || data.sender || "친구";
            const displayMsg = data.text || "";
            const displayProfile = data.profile || "https://cdn-icons-png.flaticon.com/512/149/149071.png";

            wrapper.innerHTML = `
                <div class="profile-circle"><img src="${displayProfile}"></div>
                <div class="msg-content-wrapper">
                    <div class="msg-sender">${displayName}</div>
                    <div class="msg-bubble">${data.type === 'image' ? `<img src="${data.url}" class="chat-img" onclick="window.open(this.src)">` : displayMsg}</div>
                </div>`;
            chatBox.appendChild(wrapper);
        }
        scrollBottom();
    });

    // 접속자 관리
    const myPresence = presenceRef.push(myNick);
    myPresence.onDisconnect().remove();
    presenceRef.on('value', snap => {
        document.getElementById('userCount').innerText = `현재 ${snap.numChildren()}명 접속 중 🔥 (프로필 수정 클릭)`;
    });

    // 입퇴장
    chatRef.push({ type: 'system', text: `✨ ${myRealName}(${myNick})님이 입장하셨습니다.` });
    const leaveRef = chatRef.push();
    leaveRef.onDisconnect().set({ type: 'system', text: `👋 ${myRealName}님이 학교를 떠났습니다.` });

    function sendMsg() {
        const input = document.getElementById('msgInput');
        if(!input.value.trim()) return;
        chatRef.push({ type: 'text', text: input.value, sender: myNick, realName: myRealName, profile: myProfileUrl });
        input.value = '';
        input.focus();
    }

    async function uploadImage(input) {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        const ref = storage.ref(`images/${roomId}/${Date.now()}_${file.name}`);
        const snap = await ref.put(file);
        const url = await snap.ref.getDownloadURL();
        chatRef.push({ type: 'image', url: url, sender: myNick, realName: myRealName, profile: myProfileUrl });
    }

    // 프로필 수정 모달 함수
    function openEditModal() {
        document.getElementById('editPreview').src = myProfileUrl;
        document.getElementById('editRealName').value = myRealName;
        document.getElementById('editModal').style.display = 'flex';
    }
    function closeEditModal() { document.getElementById('editModal').style.display = 'none'; }
    function previewEdit(input) {
        if (input.files && input.files[0]) {
            const reader = new FileReader();
            reader.onload = e => document.getElementById('editPreview').src = e.target.result;
            reader.readAsDataURL(input.files[0]);
        }
    }
    async function saveProfile() {
        const newName = document.getElementById('editRealName').value.trim();
        const newFile = document.getElementById('editFile').files[0];
        if(!newName) return;
        const saveBtn = document.getElementById('saveBtn');
        saveBtn.innerText = "저장 중...";
        const oldName = myRealName;
        myRealName = newName;
        sessionStorage.setItem('realName', newName);
        if(newFile) {
            const ref = storage.ref(`profiles/${Date.now()}_${newFile.name}`);
            await ref.put(newFile);
            myProfileUrl = await ref.getDownloadURL();
            sessionStorage.setItem('profileUrl', myProfileUrl);
        }
        if(oldName !== newName) chatRef.push({ type: 'system', text: `📢 ${oldName}님이 ${newName}으로 이름을 변경했습니다.` });
        saveBtn.innerText = "저장";
        closeEditModal();
    }

    // ⚡ 핵심: 맨 아래로 스크롤
    function scrollBottom() {
        const chatBox = document.getElementById('chatBox');
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    }

    // 📱 모바일 키보드 대응 레이아웃 엔진 (가장 중요!)
    function handleVisualViewport() {
        const vv = window.visualViewport;
        const app = document.getElementById('app');
        
        // 키보드가 올라오면 visualViewport의 높이가 줄어듭니다.
        // 그 높이에 맞춰 전체 앱의 높이를 고정합니다.
        app.style.height = `${vv.height}px`;
        
        // 키보드가 올라왔을 때 입력창이 가려지지 않도록 맨 아래로 스크롤
        if (document.activeElement.tagName === 'INPUT') {
            setTimeout(scrollBottom, 100);
        }
    }

    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', handleVisualViewport);
        window.visualViewport.addEventListener('scroll', handleVisualViewport);
    }
    window.addEventListener('load', handleVisualViewport);
    
    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
    // 입력창 포커스 시 스크롤 대응
    document.getElementById('msgInput').addEventListener('focus', () => {
        setTimeout(scrollBottom, 300);
    });
</script>
</body>
</html>
