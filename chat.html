<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

<script>
    // 1. 모바일 높이 조절 (키보드 대응)
    function adjustHeight() {
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.getElementById('app').style.height = `${vh}px`;
    }
    if (window.visualViewport) {
        window.visualViewport.addEventListener('resize', adjustHeight);
    }
    window.addEventListener('load', adjustHeight);

        // ⚠️ 주의: 아래의 config 내용을 본인의 Firebase 설정값으로 반드시 교체하세요!
        const firebaseConfig = {
            apiKey: "1067794324006",
            databaseURL: "https://test-1966e-default-rtdb.firebaseio.com",
            projectId: "test-1966e",
            appId: "1:1067794324006:web:a98367fccd9db10623a4e7"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // 3. 데이터 가져오기 및 방 설정
    const params = new URLSearchParams(window.location.search);
    const school = params.get('school');
    const year = params.get('year');
    const myNick = params.get('nick');
    const roomId = btoa(encodeURIComponent(school + year));

    document.getElementById('roomTitle').innerText = `${school} ${year}학번`;

    // 4. 메시지 전송 (시간 데이터 제거)
    const input = document.getElementById('msgInput');
    function sendMsg() {
        if(!input.value.trim()) return;

        database.ref('rooms/' + roomId).push({
            text: input.value,
            sender: myNick
            // timestamp 항목을 완전히 삭제했습니다.
        });
        
        input.value = '';
        input.focus();
    }

    // 엔터키 전송 이벤트
    input.addEventListener('keypress', (e) => {
        if(e.key === 'Enter') sendMsg();
    });

    // 5. 메시지 수신 및 화면 표시 (시간 표시 로직 제거)
    database.ref('rooms/' + roomId).on('child_added', (snapshot) => {
        const data = snapshot.val();
        const chatBox = document.getElementById('chatBox');
        if (!data) return; // 데이터가 없을 경우 방지

        const isMe = data.sender === myNick;
        
        const container = document.createElement('div');
        container.className = `msg-container ${isMe ? 'me' : ''}`;
        
        // 시간 관련 HTML 코드를 모두 제거하고 닉네임과 텍스트만 남겼습니다.
        container.innerHTML = `
            <div class="msg-sender">${data.sender}</div>
            <div class="msg-bubble">${data.text}</div>
        `;
        
        chatBox.appendChild(container);
        chatBox.scrollTop = chatBox.scrollHeight;
    });
</script>
