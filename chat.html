<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>학연지연 - 실시간 톡</title>
    <style>
        :root { --bg-color: #abc1d1; --primary-color: #4a90e2; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100dvh; background-color: var(--bg-color); font-family: sans-serif; overflow: hidden; }
        #app { display: flex; flex-direction: column; height: 100%; width: 100%; }
        
        /* 헤더: 접속자 수 포함 */
        .header { 
            height: 60px; background: white; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; border-bottom: 1px solid #ddd; z-index: 10; 
        }
        .header .title { font-weight: bold; font-size: 16px; margin-bottom: 2px; }
        .header .user-count { font-size: 11px; color: var(--primary-color); font-weight: bold; }

        #chatBox { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; -webkit-overflow-scrolling: touch; }
        
        /* 메시지 스타일 */
        .msg-container { margin-bottom: 12px; display: flex; flex-direction: column; max-width: 85%; }
        .msg-sender { font-size: 12px; color: #444; margin-bottom: 4px; margin-left: 3px; }
        .msg-bubble { background: white; padding: 10px 14px; border-radius: 12px; font-size: 15px; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-break: break-all; }
        .system-msg { align-self: center; background: rgba(0,0,0,0.1); color: white; padding: 5px 15px; border-radius: 20px; font-size: 11px; margin: 10px 0; }
        
        .me { align-self: flex-end; align-items: flex-end; }
        .me .msg-bubble { background: #fee500; }
        .me .msg-sender { display: none; }
        .chat-img { max-width: 100%; border-radius: 10px; margin-top: 5px; cursor: pointer; }

        /* 입력 영역 */
        .input-area { background: white; padding: 10px; display: flex; gap: 8px; align-items: center; padding-bottom: calc(10px + env(safe-area-inset-bottom)); }
        input { flex: 1; height: 40px; border-radius: 20px; border: 1px solid #ddd; padding: 0 15px; font-size: 16px; outline: none; background: #fcfcfc; }
        .btn-icon { background: #eee; border: none; border-radius: 50%; width: 40px; height: 40px; cursor: pointer; font-size: 18px; display: flex; align-items: center; justify-content: center; }
        .btn-send { width: 55px; height: 40px; background: var(--primary-color); color: white; border: none; border-radius: 10px; font-weight: bold; }
    </style>
</head>
<body>

<div id="app">
    <div class="header">
        <div class="title" id="roomTitle">학연지연</div>
        <div class="user-count" id="userCount">접속자 확인 중...</div>
    </div>
    
    <div id="chatBox"></div>
    
    <div class="input-area">
        <input type="file" id="fileInput" accept="image/*" style="display:none" onchange="uploadImage(this)">
        <button class="btn-icon" onclick="document.getElementById('fileInput').click()">📷</button>
        <input type="text" id="msgInput" placeholder="메시지 입력..." autocomplete="off">
        <button class="btn-send" onclick="sendMsg()">전송</button>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-storage-compat.js"></script>

<script>
    // ✅ 수정된 마마님의 Firebase 설정값
    const firebaseConfig = {
        apiKey: "AIzaSyAXkZ-65CkAe-3usVaJa2EfhzejLJodCvQ",
        databaseURL: "https://test-1966e-default-rtdb.firebaseio.com",
        projectId: "test-1966e",
        storageBucket: "test-1966e.appspot.com",
        appId: "1:1067794324006:web:a98367fccd9db10623a4e7"
    };

    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();
    const storage = firebase.storage();

    const params = new URLSearchParams(window.location.search);
    const school = params.get('school') || "학연지연";
    const year = params.get('year') || "동창";
    const myNick = params.get('nick') || "익명";
    const roomId = encodeURIComponent(school + year).replace(/%/g, "");

    document.getElementById('roomTitle').innerText = `🤝 ${school} ${year}학번`;

    const chatRef = database.ref('rooms/' + roomId);
    const presenceRef = database.ref('rooms/' + roomId + '/presence');

    // 실시간 접속자 체크
    const myPresence = presenceRef.push(myNick);
    myPresence.onDisconnect().remove();

    presenceRef.on('value', (snapshot) => {
        const count = snapshot.numChildren();
        document.getElementById('userCount').innerText = `현재 ${count}명 접속 중 🔥`;
    });

    // 입퇴장 알림
    chatRef.push({ type: 'system', text: `${myNick}님이 입장하셨습니다. ✨` });
    chatRef.onDisconnect().push({ type: 'system', text: `${myNick}님이 학교를 떠났습니다. 👋` });

    function sendMsg() {
        const input = document.getElementById('msgInput');
        if(!input.value.trim()) return;
        chatRef.push({ type: 'text', text: input.value, sender: myNick });
        input.value = '';
        input.focus();
    }

    async function uploadImage(input) {
        if (!input.files || !input.files[0]) return;
        const file = input.files[0];
        const fileName = Date.now() + "_" + file.name;
        const storageRef = storage.ref(`images/${roomId}/${fileName}`);
        try {
            const snapshot = await storageRef.put(file);
            const url = await snapshot.ref.getDownloadURL();
            chatRef.push({ type: 'image', url: url, sender: myNick });
        } catch (err) { alert("업로드 실패: " + err.message); }
    }

    chatRef.on('child_added', (snapshot) => {
        const data = snapshot.val();
        const chatBox = document.getElementById('chatBox');
        if (data.type === 'system') {
            const div = document.createElement('div');
            div.className = 'system-msg';
            div.innerText = data.text;
            chatBox.appendChild(div);
        } else {
            const isMe = data.sender === myNick;
            const container = document.createElement('div');
            container.className = `msg-container ${isMe ? 'me' : ''}`;
            const content = data.type === 'image' 
                ? `<img src="${data.url}" class="chat-img" onclick="window.open(this.src)">` 
                : `<div class="msg-bubble">${data.text}</div>`;
            container.innerHTML = `<div class="msg-sender">${data.sender}</div>${content}`;
            chatBox.appendChild(container);
        }
        chatBox.scrollTo({ top: chatBox.scrollHeight, behavior: 'smooth' });
    });

    document.getElementById('msgInput').addEventListener('keypress', (e) => { if(e.key === 'Enter') sendMsg(); });
    function resizer() {
        const vh = window.visualViewport ? window.visualViewport.height : window.innerHeight;
        document.getElementById('app').style.height = vh + "px";
    }
    window.visualViewport?.addEventListener('resize', resizer);
    window.addEventListener('load', resizer);
</script>

</body>
</html>
