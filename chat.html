<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>실시간 동창 대화방</title>
    <style>
        /* (스타일은 이전과 동일하게 유지하거나 조금 더 다듬었습니다) */
        body { font-family: sans-serif; margin: 0; background-color: #e6ecf0; }
        .header { background: #4a90e2; color: white; padding: 15px; text-align: center; font-weight: bold; position: sticky; top: 0; }
        .chat-box { height: calc(100vh - 160px); overflow-y: auto; padding: 20px; display: flex; flex-direction: column; }
        .msg { background: white; padding: 10px 15px; border-radius: 18px; margin-bottom: 10px; max-width: 70%; align-self: flex-start; box-shadow: 0 1px 2px rgba(0,0,0,0.1); word-break: break-all; }
        .msg.me { background: #dcf8c6; align-self: flex-end; }
        .input-area { position: fixed; bottom: 0; width: 100%; background: white; padding: 15px; display: flex; box-sizing: border-box; }
        input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 20px; outline: none; }
        button { margin-left: 10px; padding: 10px 20px; background: #4a90e2; color: white; border: none; border-radius: 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="header">
        <span id="roomTitle">연결 중...</span>
    </div>

    <div id="chatBox" class="chat-box">
        </div>

    <div class="input-area">
        <input type="text" id="msgInput" placeholder="메시지를 입력하세요..." onkeypress="if(event.keyCode==13) sendMsg()">
        <button onclick="sendMsg()">전송</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>

    <script>
        // ⚠️ 주의: 아래의 config 내용을 본인의 Firebase 설정값으로 반드시 교체하세요!
        const firebaseConfig = {
            apiKey: "1067794324006",
            authDomain: "test-1966e.firebaseapp.com",
            databaseURL: "https://test-1966e-default-rtdb.firebaseio.com",
            projectId: "test-1966e",
            storageBucket: "test-1966e.appspot.com",
            messagingSenderId: "han3584",
            appId: "1:1067794324006:web:a98367fccd9db10623a4e7"
        };

        // Firebase 초기화
        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        // URL 파라미터 읽기 (학교명, 입학년도)
        const params = new URLSearchParams(window.location.search);
        const school = params.get('school');
        const year = params.get('year');
        const roomId = btoa(encodeURIComponent(school + year)); // 방 식별자 생성

        document.getElementById('roomTitle').innerText = `🎓 ${school} ${year}학번 대화방`;

        // 1. 메시지 전송 기능
        function sendMsg() {
            const input = document.getElementById('msgInput');
            if(!input.value.trim()) return;

            const newMessage = {
                text: input.value,
                timestamp: Date.now(),
                sender: '익명' // 나중에 로그인 기능을 넣으면 닉네임으로 바꿀 수 있어요!
            };

            // 해당 방의 데이터 경로에 저장
            database.ref('rooms/' + roomId).push(newMessage);
            input.value = '';
        }

        // 2. 메시지 실시간 수신 기능
        database.ref('rooms/' + roomId).on('child_added', (snapshot) => {
            const data = snapshot.val();
            renderMsg(data);
        });

        function renderMsg(data) {
            const chatBox = document.getElementById('chatBox');
            const msgDiv = document.createElement('div');
            msgDiv.className = 'msg';
            
            // 실시간성을 보여주기 위해 텍스트 노출
            msgDiv.innerText = data.text;
            
            chatBox.appendChild(msgDiv);
            chatBox.scrollTop = chatBox.scrollHeight;
        }
    </script>
</body>
</html>
